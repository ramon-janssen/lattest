name:                example-simple
version:             0.1.0.0
license:             BSD-3-Clause
author:              "David van Balen"
maintainer:          "dpvanbalen@hotmail.com"
copyright:           "2026 David van Balen"

dependencies:
- base >= 4.7 && < 5
- lattest-lib >= 0.1.0.0
- containers >= 0.6.8
- random

ghc-options:
- -Wall
- -Wcompat
- -Widentities
- -Wincomplete-record-updates
- -Wincomplete-uni-patterns
- -Wmissing-export-lists
- -Wmissing-home-modules
- -Wpartial-fields
- -Wredundant-constraints

executables:
  example-template-exe:
    main:                Main.hs
    source-dirs:         app
    ghc-options:
    - -threaded
    - -rtsopts
    - -with-rtsopts=-N
